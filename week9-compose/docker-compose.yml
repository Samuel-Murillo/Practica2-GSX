# ============================================================================
# docker-compose.yml — GreenDevCorp Stack Completo
# Práctica 2 GSX | Semana 9: Orquestación Multicontenedor
#
# Stack:
#   - nginx-proxy:   Punto de entrada único (puerto 80 expuesto al host)
#   - backend:       FastAPI API REST (sólo accesible internamente)
#   - frontend:      Dashboard web Nginx (sólo accesible via proxy)
#   - postgres:      Base de datos PostgreSQL (totalmente aislada)
#
# Seguridad:
#   [1] Redes separadas (DMZ, Internal, Database) — ningún servicio accede
#       a una red que no necesita (principio de mínimo privilegio a nivel red)
#   [2] Credenciales via .env (nunca hardcoded en este fichero)
#   [3] restart: unless-stopped para resiliencia en producción
#   [4] Healthchecks + depends_on para orden de arranque correcto
#   [5] Logging con rotación para evitar llenar el disco
#   [6] read_only filesystem donde sea posible
# ============================================================================

name: greendavcorp

services:

  # ──────────────────────────────────────────────────────────────────────────
  # NGINX REVERSE PROXY — Único servicio expuesto al exterior
  # Red: dmz_net (recibe tráfico externo) + internal_net (reenvía al backend/frontend)
  # ──────────────────────────────────────────────────────────────────────────
  nginx-proxy:
    build:
      context: ./week8-docker/nginx
      dockerfile: Dockerfile
    image: greendavcorp-proxy:1.0.0
    container_name: greendavcorp-proxy
    ports:
      - "80:8080"     # Mapeo: externo 80 → contenedor 8080 (non-root port)
    networks:
      - dmz_net       # Red exterior (recibe peticiones del mundo)
      - internal_net  # Red interna (reenvía a frontend y backend)
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # FRONTEND — Dashboard web servido por Nginx
  # Red: internal_net ÚNICAMENTE — no accesible desde el exterior directamente
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./week8-docker/frontend
      dockerfile: Dockerfile
    image: greendavcorp-frontend:1.0.0
    container_name: greendavcorp-frontend
    # NO hay 'ports' — sólo accesible a través del proxy
    networks:
      - internal_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # BACKEND — FastAPI API REST
  # Red: internal_net (recibe del proxy) + db_net (accede a PostgreSQL)
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./week8-docker/backend
      dockerfile: Dockerfile
    image: greendavcorp-backend:1.0.0
    container_name: greendavcorp-backend
    # NO hay 'ports' — sólo accesible a través del proxy
    environment:
      # Configuración general — no sensible
      APP_ENV:     ${APP_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      # Configuración de base de datos — cargada desde .env
      DB_HOST:     ${DB_HOST:-postgres}
      DB_PORT:     ${DB_PORT:-5432}
      DB_NAME:     ${DB_NAME:-greendavcorp}
      DB_USER:     ${DB_USER}       # Obligatorio en .env
      DB_PASSWORD: ${DB_PASSWORD}   # Obligatorio en .env
      # CORS — permitir peticiones desde el frontend (via proxy)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
    networks:
      - internal_net  # Recibe peticiones del proxy
      - db_net        # Accede a PostgreSQL
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ──────────────────────────────────────────────────────────────────────────
  # POSTGRESQL — Base de datos
  # Red: db_net ÚNICAMENTE — totalmente aislada del exterior y del frontend
  # ──────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: greendavcorp-postgres
    # NO hay 'ports' — PostgreSQL NO expuesto al host ni al exterior
    environment:
      POSTGRES_DB:       ${DB_NAME:-greendavcorp}
      POSTGRES_USER:     ${DB_USER}       # Obligatorio en .env
      POSTGRES_PASSWORD: ${DB_PASSWORD}   # Obligatorio en .env
      # Optimización para contenedor (desactiva huge pages)
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      # Named volume para persistencia de datos entre reinicios
      - postgres_data:/var/lib/postgresql/data
      # Script de inicialización (se ejecuta sólo en la primera creación)
      - ./week9-compose/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - db_net          # Sólo accesible desde backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # pg_isready: herramienta oficial de PostgreSQL para verificar disponibilidad
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-greendavcorp}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

# ============================================================================
# Volúmenes — persistencia de datos
# ============================================================================
volumes:
  postgres_data:
    driver: local
    name: greendavcorp_postgres_data
    labels:
      project: greendavcorp
      component: database

# ============================================================================
# Redes — segmentación por capas (DMZ / Internal / Database)
#
# Arquitectura de red:
#   dmz_net:      Nginx Proxy (expuesto al exterior)
#   internal_net: Proxy ↔ Frontend ↔ Backend (red privada de servicios)
#   db_net:       Backend ↔ PostgreSQL (red de base de datos aislada)
#
# Un atacante que comprometa el Frontend NO puede acceder a PostgreSQL
# porque el Frontend no está en db_net.
# ============================================================================
networks:
  dmz_net:
    driver: bridge
    name: greendavcorp_dmz
    labels:
      project: greendavcorp
      zone: dmz

  internal_net:
    driver: bridge
    name: greendavcorp_internal
    labels:
      project: greendavcorp
      zone: internal

  db_net:
    driver: bridge
    name: greendavcorp_database
    labels:
      project: greendavcorp
      zone: database
