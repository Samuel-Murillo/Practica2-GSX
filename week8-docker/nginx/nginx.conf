# ============================================================================
# nginx.conf — Reverse Proxy (punto de entrada único del sistema)
# Práctica 2 GSX | Semana 8
#
# Responsabilidad: Recibir TODO el tráfico externo y enrutarlo al servicio
#                  correcto (Frontend en :3000, Backend API en :8000).
#
# Arquitectura:
#   Internet → Nginx Proxy (:80) ──┬──► Frontend (:3000)
#                                  └──► Backend  (:8000)  via /api/*
#
# Seguridad:
#   [1] server_tokens off — versión oculta
#   [2] Rate limiting por zona
#   [3] Cabeceras de seguridad
#   [4] Timeout conservadores
#   [5] client_max_body_size limitado
# ============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── [SEGURIDAD] Ocultar versión ───────────────────────────────────
    server_tokens off;

    # ── Logging estructurado ──────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    # ── Rendimiento ───────────────────────────────────────────────────
    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── [SEGURIDAD] Limitar tamaño del body ───────────────────────────
    # Previene ataques de upload masivo
    client_max_body_size 10m;

    # ── [SEGURIDAD] Timeouts conservadores ───────────────────────────
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # ── Rate limiting por zona ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;

    # ── Compresión ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    # ─────────────────────────────────────────────────────────────────
    # Upstream definitions — nombres DNS internos Docker/K8s
    # ─────────────────────────────────────────────────────────────────
    upstream frontend_upstream {
        server frontend:3000;
        # keepalive: mantiene conexiones TCP reutilizables al upstream
        keepalive 16;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 16;
    }

    # ─────────────────────────────────────────────────────────────────
    # Servidor principal
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Cabeceras de seguridad ────────────────────────────────────
        add_header X-Content-Type-Options "nosniff"            always;
        add_header X-Frame-Options        "SAMEORIGIN"         always;
        add_header X-XSS-Protection       "1; mode=block"      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        # ── Rate limit general ────────────────────────────────────────
        limit_req zone=general burst=50 nodelay;

        # ── /api/* → Backend FastAPI ──────────────────────────────────
        location /api/ {
            # Rate limit más estricto para la API
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;

            # Cabeceras necesarias para que el backend conozca el cliente real
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";  # HTTP/1.1 keepalive

            # Timeouts del proxy
            proxy_connect_timeout  5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    15s;
        }

        # ── /health → Backend health check ───────────────────────────
        location /health {
            proxy_pass http://backend_upstream/health;
            access_log off;
        }

        # ── /metrics → Backend metrics (sólo red interna) ─────────────
        location /metrics {
            # En prod real: allow 10.0.0.0/8; deny all;
            proxy_pass http://backend_upstream/metrics;
            access_log off;
        }

        # ── /* → Frontend ─────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
        }

        # ── Ocultar ficheros ocultos ──────────────────────────────────
        location ~ /\. { deny all; }
    }
}
