# ============================================================================
# nginx.conf — Reverse Proxy (punto de entrada único del sistema)
# Práctica 2 GSX | Semana 8
#
# Puerto: 8080 (non-privileged — compatible con non-root user)
# El mapeo externo 80→8080 lo realiza Docker Compose.
#
# Arquitectura:
#   Internet → Compose port 80 → Nginx Proxy :8080
#              ┌─► Frontend  :8080 (via /*)
#              └─► Backend   :8000 (via /api/*, /health, /metrics)
# ============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── [SEGURIDAD] Ocultar versión ───────────────────────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr [$time_local] "$request" $status '
                    '$body_bytes_sent "$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── [SEGURIDAD] Límites ───────────────────────────────────────────
    client_max_body_size   10m;
    client_body_timeout    12s;
    client_header_timeout  12s;
    send_timeout           10s;

    # ── Rate limiting ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;

    # ── Compresión ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Upstreams — DNS interno Docker/K8s ───────────────────────────
    upstream frontend_upstream {
        server frontend:8080;   # Frontend escucha en 8080 (non-root)
        keepalive 16;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 16;
    }

    # ── Servidor principal — puerto 8080 (non-privileged) ─────────────
    server {
        listen 8080;
        server_name _;

        # ── [SEGURIDAD] Cabeceras ─────────────────────────────────────
        add_header X-Content-Type-Options "nosniff"            always;
        add_header X-Frame-Options        "SAMEORIGIN"         always;
        add_header X-XSS-Protection       "1; mode=block"      always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

        limit_req zone=general burst=50 nodelay;

        # ── /api/* → Backend FastAPI ──────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
            proxy_connect_timeout  5s;
            proxy_read_timeout    30s;
            proxy_send_timeout    15s;
        }

        # ── /health → Backend health ──────────────────────────────────
        location /health {
            proxy_pass http://backend_upstream/health;
            access_log off;
        }

        # ── /metrics → Backend metrics ────────────────────────────────
        location /metrics {
            proxy_pass http://backend_upstream/metrics;
            access_log off;
        }

        # ── /* → Frontend ─────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Connection        "";
        }

        location ~ /\. { deny all; }
    }
}
