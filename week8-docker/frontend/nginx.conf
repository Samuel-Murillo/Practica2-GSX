# ============================================================================
# nginx.conf — Frontend Nginx Server
# Práctica 2 GSX | Semana 8
#
# Configuración de seguridad:
#   [1] server_tokens off — No revelar versión de Nginx
#   [2] Cabeceras de seguridad HTTP en todas las respuestas
#   [3] Rate limiting — protección contra DDoS/brute force
#   [4] Compresión gzip — rendimiento
#   [5] Cache-Control correctos por tipo de archivo
# ============================================================================

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;   # /tmp en lugar de /var/run para non-root

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── [SEGURIDAD] Ocultar versión de Nginx ─────────────────────────
    server_tokens off;

    # ── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # ── Rendimiento ───────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # ── Compresión gzip ───────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        image/svg+xml;

    # ── Rate limiting — protección DDoS ───────────────────────────────
    # 10 requests/segundo por IP, burst de 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Servidor principal ────────────────────────────────────────────
    server {
        listen      3000;
        server_name _;
        root        /usr/share/nginx/html;
        index       index.html;

        # ── [SEGURIDAD] Cabeceras HTTP de seguridad ───────────────────
        add_header X-Content-Type-Options    "nosniff"                    always;
        add_header X-Frame-Options           "SAMEORIGIN"                 always;
        add_header X-XSS-Protection          "1; mode=block"              always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=()" always;
        # Content-Security-Policy: ajustar en producción real
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self';"
            always;

        # ── Archivos estáticos con cache largo ────────────────────────
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── HTML — sin cache (siempre fresh) ─────────────────────────
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # ── SPA fallback ──────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Ocultar ficheros sensibles ────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ── Health check endpoint para Docker/K8s probes ─────────────
        location /health {
            access_log off;
            return 200 '{"status":"healthy","service":"frontend"}';
            add_header Content-Type application/json;
        }
    }
}
